<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BVMW Umfrage 1 - KI-Situation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Calibri', 'Arial', sans-serif;
            background: linear-gradient(135deg, #006B7A 0%, #004A56 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            padding: 60px 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header h1 {
            color: #006B7A;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 16px;
        }

        .question {
            background: #f9f9f9;
            padding: 30px;
            border-radius: 8px;
            margin-bottom: 40px;
            border-left: 5px solid #D35400;
        }

        .question h2 {
            color: #004A56;
            font-size: 24px;
            margin-bottom: 30px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option {
            position: relative;
        }

        .option input[type="radio"] {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .option-label {
            display: flex;
            align-items: center;
            padding: 20px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
            color: #333;
        }

        .option input[type="radio"]:checked + .option-label {
            background: #E8F4F6;
            border-color: #006B7A;
            color: #004A56;
            font-weight: bold;
        }

        .option-label:hover {
            border-color: #006B7A;
            background: #f0f8fa;
        }

        .radio-circle {
            width: 24px;
            height: 24px;
            border: 2px solid #006B7A;
            border-radius: 50%;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .option input[type="radio"]:checked + .option-label .radio-circle {
            background: #006B7A;
        }

        .option input[type="radio"]:checked + .option-label .radio-circle::after {
            content: '';
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
        }

        .option-text {
            flex: 1;
        }

        .option-letter {
            font-weight: bold;
            color: #006B7A;
            margin-right: 10px;
            min-width: 30px;
        }

        .results {
            margin-top: 50px;
            padding: 30px;
            background: #E8F4F6;
            border-radius: 8px;
            display: none;
        }

        .results.show {
            display: block;
        }

        .results h3 {
            color: #004A56;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .result-item {
            margin-bottom: 20px;
        }

        .result-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        .result-bar {
            width: 100%;
            height: 30px;
            background: #ddd;
            border-radius: 4px;
            overflow: hidden;
        }

        .result-fill {
            height: 100%;
            background: linear-gradient(90deg, #006B7A, #0D8C9E);
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            color: white;
            font-weight: bold;
            font-size: 14px;
        }

        .submit-btn {
            background: #006B7A;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 20px;
        }

        .submit-btn:hover {
            background: #004A56;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 107, 122, 0.3);
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .stats {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        .total-votes {
            font-weight: bold;
            color: #006B7A;
            font-size: 16px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .question {
                padding: 20px;
            }

            .option-label {
                flex-direction: column;
                text-align: center;
            }

            .radio-circle {
                margin-right: 0;
                margin-bottom: 10px;
            }
        }
    </style>
</head>

                    </label>
                </div>

                <div class="option">
                    <input type="radio" id="optionC" name="situation" value="C">
                    <label for="optionC" class="option-label">
                        <div class="radio-circle"></div>
                        <div class="option-text">
                            <span class="option-letter">C</span>
                            KI mit Zielen — braucht Nachweis
                        </div>
                    </label>
                </div>
            </div>

            <button class="submit-btn" onclick="submitVote()">Abstimmung abgeben</button>
        </div>

        <div class="results" id="results">
            <h3>📈 Live-Ergebnisse</h3>

            <div class="result-item">
                <div class="result-label">
                    <span>A — Noch keine Initiative</span>
                    <span id="percentA">0%</span>
                </div>
                <div class="result-bar">
                    <div class="result-fill" id="barA" style="width: 0%"></div>
                </div>
                <div class="stats"><span id="countA">0</span> Stimmen</div>
            </div>

            <div class="result-item">
                <div class="result-label">
                    <span>B — KI läuft — aber ungeplant</span>
                    <span id="percentB">0%</span>
                </div>
                <div class="result-bar">
                    <div class="result-fill" id="barB" style="width: 0%"></div>
                </div>
                <div class="stats"><span id="countB">0</span> Stimmen</div>
            </div>

            <div class="result-item">
                <div class="result-label">
                    <span>C — KI mit Zielen — braucht Nachweis</span>
                    <span id="percentC">0%</span>
                </div>
                <div class="result-bar">
                    <div class="result-fill" id="barC" style="width: 0%"></div>
                </div>
                <div class="stats"><span id="countC">0</span> Stimmen</div>
            </div>

            <div style="text-align: center; margin-top: 30px;">
                <p class="total-votes">Gesamt: <span id="totalVotes">0</span> Abstimmungen</p>
            </div>
        </div>
    </div>

    <script>
        // Speichere Votes im LocalStorage
        const STORAGE_KEY = 'bvmw_umfrage_1_votes';

        // Lade Votes beim Laden
        let votes = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { A: 0, B: 0, C: 0 };

        // Zeige Ergebnisse, wenn es Votes gibt
        if (Object.values(votes).some(v => v > 0)) {
            document.getElementById('results').classList.add('show');
            updateResults();
        }

        function submitVote() {
            const selected = document.querySelector('input[name="situation"]:checked');

            if (!selected) {
                alert('Bitte wählen Sie eine Option');
                return;
            }

            const value = selected.value;
            votes[value]++;

            // Speichere im LocalStorage
            localStorage.setItem(STORAGE_KEY, JSON.stringify(votes));

            // Zeige Ergebnisse
            document.getElementById('results').classList.add('show');
            updateResults();

            // Reset Radio Button
            selected.checked = false;

            // Feedback
            alert('Danke für Ihre Abstimmung!');
        }

        function updateResults() {
            const total = votes.A + votes.B + votes.C;

            if (total === 0) return;

            const getPercent = (count) => total > 0 ? Math.round((count / total) * 100) : 0;
            const getWidth = (count) => total > 0 ? (count / total) * 100 : 0;

            // Update A
            document.getElementById('countA').textContent = votes.A;
            document.getElementById('percentA').textContent = getPercent(votes.A) + '%';
            document.getElementById('barA').style.width = getWidth(votes.A) + '%';

            // Update B
            document.getElementById('countB').textContent = votes.B;
            document.getElementById('percentB').textContent = getPercent(votes.B) + '%';
            document.getElementById('barB').style.width = getWidth(votes.B) + '%';

            // Update C
            document.getElementById('countC').textContent = votes.C;
            document.getElementById('percentC').textContent = getPercent(votes.C) + '%';
            document.getElementById('barC').style.width = getWidth(votes.C) + '%';

            // Update Total
            document.getElementById('totalVotes').textContent = total;
        }

        // Auto-Update alle 2 Sekunden (falls mehrere Browser-Fenster offen sind)
        setInterval(() => {
            const stored = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { A: 0, B: 0, C: 0 };
            votes = stored;
            if (Object.values(votes).some(v => v > 0)) {
                document.getElementById('results').classList.add('show');
                updateResults();
            }
        }, 2000);
    </script>
</body>
</html>
