<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BVMW Umfrage 1 - KI-Situation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Calibri', 'Arial', sans-serif;
            background: linear-gradient(135deg, #006B7A 0%, #004A56 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            padding: 60px 40px;
            position: relative;
        }

        .logos {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            width: calc(100% - 40px);
        }

        .logo-img {
            height: 60px;
            object-fit: contain;
        }

        .logo-left {
            flex: 1;
        }

        .logo-right {
            flex: 1;
            text-align: right;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            margin-top: 30px;
        }

        .header h1 {
            color: #006B7A;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 16px;
        }

        .question {
            background: #f9f9f9;
            padding: 30px;
            border-radius: 8px;
            margin-bottom: 40px;
            border-left: 5px solid #D35400;
        }

        .question h2 {
            color: #004A56;
            font-size: 24px;
            margin-bottom: 30px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option {
            position: relative;
        }

        .option input[type="radio"] {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .option-label {
            display: flex;
            align-items: center;
            padding: 20px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
            color: #333;
        }

        .option input[type="radio"]:checked + .option-label {
            background: #E8F4F6;
            border-color: #006B7A;
            color: #004A56;
            font-weight: bold;
        }

        .option-label:hover {
            border-color: #006B7A;
        }

        .option-text {
            display: flex;
            flex-direction: column;
            margin-left: 15px;
        }

        .option-letter {
            font-weight: bold;
            color: #D35400;
            font-size: 18px;
        }

        .radio-circle {
            width: 24px;
            height: 24px;
            border: 2px solid #006B7A;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .option input[type="radio"]:checked ~ .radio-circle {
            background: #006B7A;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #004A56;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 30px;
        }

        .submit-btn:hover {
            background: #006B7A;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 107, 122, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .results {
            background: #f0f0f0;
            padding: 30px;
            border-radius: 8px;
            margin-top: 40px;
        }

        .results h3 {
            color: #004A56;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .result-item {
            margin-bottom: 20px;
        }

        .result-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
            color: #333;
        }

        .result-bar {
            height: 24px;
            background: #ddd;
            border-radius: 4px;
            overflow: hidden;
        }

        .result-fill {
            height: 100%;
            background: linear-gradient(90deg, #006B7A, #00A8C0);
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: bold;
        }

        .total-votes {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 40px 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .question h2 {
                font-size: 18px;
            }

            .option-label {
                padding: 15px;
                font-size: 14px;
            }
        }
    </style>
</head>

        <div class="header">
            <h1>BVMW Webinar</h1>
            <p>KI-Erfolg messbar machen</p>
        </div>

        <div class="question">
            <h2>📊 Wie ist Ihre aktuelle KI-Situation?</h2>

            <div class="options">
                <div class="option">
                    <input type="radio" id="optionA" name="situation" value="A">
                    <label for="optionA" class="option-label">
                        <div class="radio-circle"></div>
                        <div class="option-text">
                            <span class="option-letter">A</span>
                            Noch keine Initiative
                        </div>
                    </label>
                </div>

                <div class="option">
                    <input type="radio" id="optionB" name="situation" value="B">
                    <label for="optionB" class="option-label">
                        <div class="radio-circle"></div>
                        <div class="option-text">
                            <span class="option-letter">B</span>
                            KI läuft — aber ungeplant
                        </div>
                    </label>
                </div>

                <div class="option">
                    <input type="radio" id="optionC" name="situation" value="C">
                    <label for="optionC" class="option-label">
                        <div class="radio-circle"></div>
                        <div class="option-text">
                            <span class="option-letter">C</span>
                            KI mit Zielen — braucht Nachweis
                        </div>
                    </label>
                </div>
            </div>

            <button class="submit-btn" onclick="submitVote()">Abstimmung abgeben</button>
        </div>

        <div class="results">
            <h3>📈 Live-Ergebnisse</h3>

            <div class="result-item">
                <div class="result-label">
                    <span>A — Noch keine Initiative</span>
                    <span id="percentA">0%</span>
                </div>
                <div class="result-bar">
                    <div class="result-fill" id="barA" style="width: 0%"></div>
                </div>
                <div style="text-align: center; font-size: 12px; color: #999; margin-top: 4px;">
                    <span id="countA">0</span> Stimmen
                </div>
            </div>

            <div class="result-item">
                <div class="result-label">
                    <span>B — KI läuft — aber ungeplant</span>
                    <span id="percentB">0%</span>
                </div>
                <div class="result-bar">
                    <div class="result-fill" id="barB" style="width: 0%"></div>
                </div>
                <div style="text-align: center; font-size: 12px; color: #999; margin-top: 4px;">
                    <span id="countB">0</span> Stimmen
                </div>
            </div>

            <div class="result-item">
                <div class="result-label">
                    <span>C — KI mit Zielen — braucht Nachweis</span>
                    <span id="percentC">0%</span>
                </div>
                <div class="result-bar">
                    <div class="result-fill" id="barC" style="width: 0%"></div>
                </div>
                <div style="text-align: center; font-size: 12px; color: #999; margin-top: 4px;">
                    <span id="countC">0</span> Stimmen
                </div>
            </div>

            <div class="total-votes">Gesamt: <span id="totalVotes">0</span> Abstimmungen</div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'bvmw_survey_votes';

        let votes = {
            A: 0,
            B: 0,
            C: 0
        };

        // Load votes from localStorage
        function loadVotes() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                votes = JSON.parse(stored);
            }
            updateResults();
        }

        // Save votes to localStorage
        function saveVotes() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(votes));
        }

        // Submit vote
        function submitVote() {
            const selected = document.querySelector('input[name="situation"]:checked');
            
            if (!selected) {
                alert('Bitte wählen Sie eine Option');
                return;
            }

            const choice = selected.value;
            votes[choice]++;
            saveVotes();
            updateResults();

            // Reset Radio Button
            selected.checked = false;
        }

        function updateResults() {
            const total = votes.A + votes.B + votes.C;

            // Update percentages and bars
            ['A', 'B', 'C'].forEach(option => {
                const percent = total === 0 ? 0 : Math.round((votes[option] / total) * 100);
                document.getElementById(`percentA`).textContent = total === 0 ? '0%' : Math.round((votes.A / total) * 100) + '%';
                document.getElementById(`percentB`).textContent = total === 0 ? '0%' : Math.round((votes.B / total) * 100) + '%';
                document.getElementById(`percentC`).textContent = total === 0 ? '0%' : Math.round((votes.C / total) * 100) + '%';

                document.getElementById(`countA`).textContent = votes.A;
                document.getElementById(`countB`).textContent = votes.B;
                document.getElementById(`countC`).textContent = votes.C;

                document.getElementById(`barA`).style.width = percent + '%';
                document.getElementById(`barB`).style.width = (total === 0 ? 0 : Math.round((votes.B / total) * 100)) + '%';
                document.getElementById(`barC`).style.width = (total === 0 ? 0 : Math.round((votes.C / total) * 100)) + '%';
            });

            document.getElementById('totalVotes').textContent = total;
        }

        // Load votes on page load
        window.addEventListener('load', loadVotes);
    </script>
